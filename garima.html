<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MoneyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:          #0d0f14;
  --surface:     #13161e;
  --surface2:    #1a1e28;
  --surface3:    #20242f;
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.13);
  --income:      #23d18b;
  --income-soft: rgba(35,209,139,0.13);
  --expense:     #f0614e;
  --expense-soft:rgba(240,97,78,0.13);
  --text:        #f0eeea;
  --muted:       #6b7280;
  --muted2:      #9ca3af;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 3rem;
}

/* ── SHELL (plain card, scrolls with page) ── */
.shell {
  width: 100%;
  max-width: 440px;
  background: var(--surface);
  border-left: 1px solid var(--border2);
  border-right: 1px solid var(--border2);
  min-height: 100vh;
}

/* ── LOADING ── */
#loadScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 5rem 2rem; gap: 1rem;
}
.spinner {
  width: 26px; height: 26px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--income);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadMsg  { font-size: 0.82rem; color: var(--muted); }
#errorMsg { display:none; color: var(--expense); font-size: 0.8rem; text-align:center; line-height:1.6; }

/* ── MAIN STATS PAGE ── */
#statsPage { display: none; }
#statsPage.active { display: block; }

/* ── TOP NAV ── */
.top-nav {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.app-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: -0.02em;
}
.app-title span { color: var(--income); }
.refresh-btn {
  background: none; cursor: pointer; color: var(--muted);
  font-size: 0.75rem; font-family: 'DM Sans', sans-serif;
  padding: 0.3rem 0.65rem;
  border: 1px solid var(--border2); border-radius: 6px;
  transition: color 0.15s, border-color 0.15s;
}
.refresh-btn:hover { color: var(--income); border-color: var(--income); }

/* ── MONTH NAV ── */
.month-nav {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
}
.month-nav button {
  background: none; border: none; cursor: pointer;
  color: var(--muted2); font-size: 1.3rem;
  padding: 0.15rem 0.5rem;
  transition: color 0.15s;
}
.month-nav button:hover { color: var(--text); }
.month-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem; font-weight: 700;
}

/* ── SUMMARY TABS ── */
.summary-bar {
  display: flex;
  margin: 0 1.25rem 1.1rem;
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.summary-item {
  flex: 1; padding: 0.85rem 1rem;
  cursor: pointer; position: relative;
  transition: background 0.15s;
}
.summary-item:hover { background: var(--surface2); }
.summary-item + .summary-item { border-left: 1px solid var(--border); }
.s-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.3rem; }
.s-value { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
.s-value.iv { color: var(--income); }
.s-value.ev { color: var(--expense); }
.s-meta { font-size: 0.67rem; color: var(--muted); margin-top: 0.2rem; }
.s-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
.summary-item.sel .s-bar-i { background: var(--income); }
.summary-item.sel .s-bar-e { background: var(--expense); }

/* ── PIE + LEGEND ── */
.chart-section {
  display: flex; align-items: center;
  gap: 1rem; padding: 0 1.25rem 1.1rem;
}
.pie-wrap { flex-shrink: 0; }
.legend { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
.legend-row {
  display: flex; align-items: center;
  gap: 0.45rem; font-size: 0.72rem;
  cursor: pointer; color: var(--muted2);
  padding: 0.15rem 0.3rem; border-radius: 4px;
  transition: background 0.12s, color 0.12s;
}
.legend-row:hover { background: var(--surface2); color: var(--text); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.legend-pct { color: var(--muted); font-size: 0.67rem; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); }

/* ── CATEGORY PREVIEW LIST (top 4 visible) ── */
.cat-list { padding: 0.4rem 0 0; }
.cat-row {
  display: flex; align-items: center;
  gap: 0.85rem; padding: 0.75rem 1.25rem;
  cursor: pointer; transition: background 0.12s;
}
.cat-row:hover { background: var(--surface2); }
.cat-badge {
  font-size: 0.68rem; font-weight: 700;
  width: 38px; text-align: center;
  padding: 0.2rem 0; border-radius: 6px; flex-shrink: 0;
}
.cat-emoji { font-size: 1.1rem; width: 22px; text-align: center; }
.cat-name  { flex: 1; font-size: 0.84rem; }
.cat-amt   { font-size: 0.84rem; font-weight: 500; color: var(--text); }

/* ── VIEW ALL BUTTON ── */
.view-all-wrap {
  padding: 0.75rem 1.25rem 1.25rem;
}
.view-all-btn {
  width: 100%; padding: 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--muted2); font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
}
.view-all-btn:hover { background: var(--surface3); color: var(--text); }

/* ══════════════════════════════════════════
   MODAL SHEET  — fixed overlay, always works
   on iOS Safari because it's position:fixed
   with explicit height + overflow-y:scroll
   ══════════════════════════════════════════ */
.sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.sheet-overlay.open { display: flex; }

.sheet {
  width: 100%;
  max-width: 440px;
  height: 80vh;           /* explicit fixed height */
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  overflow: hidden;       /* children handle scroll */
}

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}

.sheet-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sheet-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem; font-weight: 700;
}
.sheet-close {
  background: none; border: none; cursor: pointer;
  color: var(--muted2); font-size: 1.3rem;
  padding: 0 0.25rem; line-height: 1;
  transition: color 0.15s;
}
.sheet-close:hover { color: var(--text); }

/* THE KEY: explicit height + overflow-y: scroll on this element */
.sheet-scroll {
  flex: 1;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
}

/* ── SHEET INCOME SUMMARY ── */
.sheet-income-summary {
  margin: 1rem 1.25rem;
  background: var(--income-soft);
  border: 1px solid rgba(35,209,139,0.2);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  display: flex; align-items: center;
  justify-content: space-between;
}
.sit-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--income); opacity: 0.75; margin-bottom: 0.3rem; }
.sit-val   { font-family: 'Syne', sans-serif; font-size: 1.45rem; font-weight: 700; color: var(--income); }
.sit-count-num   { font-family: 'Syne', sans-serif; font-size: 1.45rem; font-weight: 700; text-align: right; }
.sit-count-label { font-size: 0.68rem; color: var(--muted); text-align: right; margin-top: 0.1rem; }

/* ── INCOME ROW ── */
.income-row {
  display: flex; align-items: center;
  gap: 0.85rem; padding: 0.9rem 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.income-row:hover { background: var(--surface2); }
.income-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--income-soft);
  border: 1px solid rgba(35,209,139,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.income-name { font-size: 0.84rem; color: var(--text); }
.income-meta { font-size: 0.71rem; color: var(--muted); margin-top: 0.15rem; }
.income-amt  { font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--income); white-space: nowrap; }
.income-date { font-size: 0.7rem; color: var(--muted); text-align: right; margin-top: 0.15rem; }

/* ── TXN ROWS (expense cat detail) ── */
.txn-date-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.25rem 0.35rem;
  background: var(--surface2);
}
.txn-date-left { display: flex; align-items: baseline; gap: 0.4rem; }
.txn-day-num   { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; }
.txn-day-name  { font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; }
.txn-day-name.sat { background: rgba(96,165,250,0.15); color: #60a5fa; }
.txn-day-name.sun { background: var(--expense-soft); color: var(--expense); }
.txn-day-name.wd  { background: var(--surface3); color: var(--muted2); }
.txn-date-right { font-size: 0.75rem; }
.txn-date-exp { color: var(--expense); font-weight: 500; }

.txn-row {
  display: flex; align-items: center;
  gap: 0.85rem; padding: 0.8rem 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.txn-row:hover { background: var(--surface2); }
.txn-chip { display: flex; flex-direction: column; align-items: center; gap: 0.1rem; min-width: 38px; }
.txn-chip-emoji { font-size: 1.05rem; }
.txn-chip-label { font-size: 0.6rem; color: var(--muted); text-align: center; }
.txn-info { flex: 1; overflow: hidden; }
.txn-name    { font-size: 0.84rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.txn-account { font-size: 0.71rem; color: var(--muted); margin-top: 0.15rem; }
.txn-amt-e { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--expense); white-space: nowrap; }

/* ── TREND CHART INSIDE SHEET ── */
.sheet-trend { padding: 1rem 1.25rem 0.5rem; height: 148px; position: relative; }

/* ── EMPTY STATE ── */
.empty-state { padding: 2.5rem 1.25rem; text-align: center; color: var(--muted); font-size: 0.82rem; line-height: 1.7; }

/* ── FADE IN ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
#statsPage.active { animation: fadeUp 0.25s ease both; }
.sheet { animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>
<div class="shell">

  <!-- LOADING -->
  <div id="loadScreen">
    <div class="spinner"></div>
    <div id="loadMsg">Fetching transactions…</div>
    <div id="errorMsg"></div>
  </div>

  <!-- MAIN STATS PAGE -->
  <div id="statsPage">
    <div class="top-nav">
      <div class="app-title">Money<span>Flow</span></div>
      <button class="refresh-btn" onclick="reloadData()">↻ Refresh</button>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="statsMonthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="summary-bar">
      <div class="summary-item sel" id="incomeTab" onclick="openSheet('income')">
        <div class="s-label">Income</div>
        <div class="s-value iv" id="statsIncomeVal">—</div>
        <div class="s-meta" id="statsIncomeMeta"></div>
        <div class="s-bar s-bar-i"></div>
      </div>
      <div class="summary-item" id="expenseTab" onclick="openSheet('expense-overview')">
        <div class="s-label">Expenses</div>
        <div class="s-value ev" id="statsExpenseVal">—</div>
        <div class="s-meta" id="statsExpenseMeta"></div>
        <div class="s-bar s-bar-e"></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="pie-wrap">
        <canvas id="pieCanvas" width="155" height="155"
          role="img" aria-label="Donut chart of expense categories">
          Expense breakdown by category.
        </canvas>
      </div>
      <div class="legend" id="statsLegend"></div>
    </div>

    <div class="divider"></div>
    <div class="cat-list" id="statsCatList"></div>

    <div class="view-all-wrap">
      <button class="view-all-btn" id="viewAllBtn" onclick="openSheet('all-categories')">
        ↕ View all categories
      </button>
    </div>
  </div>

</div><!-- /shell -->

<!-- ══ MODAL SHEET ══ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheetOnBg(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheetTitle">Categories</span>
      <button class="sheet-close" onclick="closeSheet()">×</button>
    </div>
    <!-- month nav inside sheet for income/cat views -->
    <div id="sheetMonthNav" style="display:none">
      <div class="month-nav" style="padding:0.5rem 1.25rem">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="sheetMonthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="divider"></div>
    </div>
    <div class="sheet-scroll" id="sheetScroll">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script>
const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRe_Oj7Os2zs1Fd82tyfVbCfZ9PakC_Bi09-y3bj27C_cMN88ZwDEc_8Lgcp4k5Iw/pub?gid=1227190822&single=true&output=tsv';
const PROXIES = [
  u => u + '&_t=' + Date.now(),
  u => `https://corsproxy.io/?${encodeURIComponent(u + '&_t=' + Date.now())}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u + '&_t=' + Date.now())}`,
];
const C = { DATE:0, TYPE:1, CAT:2, SUBCAT:3, ACCOUNT:4, AMOUNT:5, DESC:6, MONTH:7, YEAR:8 };
const MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CAT_EMOJI = {
  shopping:'🧥', household:'🪑', transport:'🚕', grocery:'🛒',
  family:'👨‍👩‍👧', food:'🥘', social:'🎉', health:'🏃', us:'👫',
  rent:'🏠', salary:'💼', freelance:'💻', entertainment:'🎬',
  other:'📦', income:'💰',
};
const PIE_COLORS = ['#e85d4a','#f5a623','#f5c842','#a8d56a','#5bc48a','#3bbfbe','#6db3f2','#a78bfa','#c4b5fd','#fb923c'];

let allRows = [], curMonth = null, sheetMode = null, activeCat = null;
let pieChart = null, trendChart = null;

function emojiFor(n){ return CAT_EMOJI[(n||'').toLowerCase()] || '📦'; }
function parseAmount(s){ return s ? (parseFloat(s.replace(/[₹,\s]/g,''))||0) : 0; }
function fmtS(n){ return n>=100000?'₹'+(n/100000).toFixed(1)+'L':n>=1000?'₹'+(n/1000).toFixed(1)+'K':'₹'+Math.round(n).toLocaleString('en-IN'); }
function fmtF(n){ return '₹\u202f'+Math.round(n).toLocaleString('en-IN'); }
function monthStr(){ return MONTHS[curMonth.month0]+' '+curMonth.year; }
function esc(s){ return String(s).replace(/'/g,"\\'"); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function rowsForMonth(y, m0){
  return allRows.filter(r=>{
    const ry = parseInt(r[C.YEAR]);
    const mn = (r[C.MONTH]||'').trim();
    const rm = MONTHS.findIndex(m=>m.toLowerCase()===mn.slice(0,3).toLowerCase());
    return ry===y && rm===m0;
  });
}
function currentRows(){ return rowsForMonth(curMonth.year, curMonth.month0); }

/* ── LOAD ── */
async function loadData(){
  document.getElementById('loadScreen').style.display='flex';
  document.getElementById('statsPage').classList.remove('active');
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('loadMsg').style.display='';
  let lastErr;
  for(const build of PROXIES){
    try{
      const res = await fetch(build(TSV_URL));
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text = await res.text();
      if(!text.trim()||text.includes('<!DOCTYPE')) throw new Error('Not TSV');
      parse(text); return;
    }catch(e){ lastErr=e; }
  }
  document.getElementById('loadMsg').style.display='none';
  const err=document.getElementById('errorMsg');
  err.style.display='';
  err.innerHTML='⚠ Could not load data.<br><small>'+lastErr.message+'</small><br><small style="opacity:.6">File → Share → Publish to web</small>';
}
function reloadData(){ loadData(); }

function parse(text){
  const lines = text.trim().split('\n').map(l=>l.split('\t').map(c=>c.trim()));
  if(lines.length<2){ showErr('Sheet is empty'); return; }
  allRows = lines.slice(1).filter(r=>r.some(c=>c));
  let maxY=0,maxM=0;
  allRows.forEach(r=>{
    const y=parseInt(r[C.YEAR]);
    const m=MONTHS.findIndex(m=>m.toLowerCase()===(r[C.MONTH]||'').trim().slice(0,3).toLowerCase());
    if(!isNaN(y)&&m>=0&&(y>maxY||(y===maxY&&m>maxM))){ maxY=y; maxM=m; }
  });
  if(!maxY){ showErr('No month data found'); return; }
  curMonth={year:maxY,month0:maxM};
  document.getElementById('loadScreen').style.display='none';
  document.getElementById('statsPage').classList.add('active');
  renderStats();
}
function showErr(msg){
  document.getElementById('loadMsg').style.display='none';
  const e=document.getElementById('errorMsg'); e.style.display=''; e.textContent=msg;
}

/* ── MONTH NAV ── */
function changeMonth(dir){
  let {year,month0}=curMonth;
  month0+=dir;
  if(month0<0){month0=11;year--;} if(month0>11){month0=0;year++;}
  curMonth={year,month0};
  renderStats();
  if(sheetMode) refreshSheet();
}

/* ── STATS ── */
function renderStats(){
  const rows=currentRows();
  document.getElementById('statsMonthLabel').textContent=monthStr();
  const inc=rows.filter(r=>(r[C.TYPE]||'').toLowerCase()==='income');
  const exp=rows.filter(r=>(r[C.TYPE]||'').toLowerCase()==='expense');
  const tI=inc.reduce((s,r)=>s+parseAmount(r[C.AMOUNT]),0);
  const tE=exp.reduce((s,r)=>s+parseAmount(r[C.AMOUNT]),0);
  document.getElementById('statsIncomeVal').textContent=fmtS(tI);
  document.getElementById('statsExpenseVal').textContent=fmtS(tE);
  document.getElementById('statsIncomeMeta').textContent=inc.length+' entr'+(inc.length===1?'y':'ies');
  document.getElementById('statsExpenseMeta').textContent=exp.length+' transactions';

  const catMap={};
  exp.forEach(r=>{ const c=(r[C.CAT]||'Other').trim()||'Other'; catMap[c]=(catMap[c]||0)+parseAmount(r[C.AMOUNT]); });
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  renderPie(cats,tE);
  renderLegend(cats,tE);
  renderCatPreview(cats,tE);
}

function renderPie(cats,tE){
  if(pieChart){pieChart.destroy();pieChart=null;}
  if(!cats.length) return;
  pieChart=new Chart(document.getElementById('pieCanvas'),{
    type:'doughnut',
    data:{
      labels:cats.map(c=>c[0]),
      datasets:[{data:cats.map(c=>c[1]),backgroundColor:cats.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]),borderWidth:2,borderColor:'#13161e',hoverOffset:8}]
    },
    options:{
      responsive:false,cutout:'58%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmtF(ctx.raw)}}},
      onClick:(e,els)=>{ if(els.length) openSheet('cat-detail',cats[els[0].index][0]); }
    }
  });
}

function renderLegend(cats,tE){
  document.getElementById('statsLegend').innerHTML=cats.slice(0,7).map((c,i)=>{
    const pct=tE?Math.round(c[1]/tE*100):0;
    const col=PIE_COLORS[i%PIE_COLORS.length];
    return `<div class="legend-row" onclick="openSheet('cat-detail','${esc(c[0])}')">
      <span class="legend-dot" style="background:${col}"></span>
      <span class="legend-name">${emojiFor(c[0])} ${c[0].length>9?c[0].slice(0,9)+'…':c[0]}</span>
      <span class="legend-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderCatPreview(cats,tE){
  const el=document.getElementById('statsCatList');
  const preview=cats.slice(0,4);
  if(!preview.length){ el.innerHTML='<div class="empty-state">No expense data this month.</div>'; return; }
  el.innerHTML=preview.map((c,i)=>{
    const pct=tE?Math.round(c[1]/tE*100):0;
    const col=PIE_COLORS[i%PIE_COLORS.length];
    return `<div class="cat-row" onclick="openSheet('cat-detail','${esc(c[0])}')">
      <span class="cat-badge" style="background:${col}22;color:${col}">${pct}%</span>
      <span class="cat-emoji">${emojiFor(c[0])}</span>
      <span class="cat-name">${c[0]}</span>
      <span class="cat-amt">${fmtF(c[1])}</span>
    </div>`;
  }).join('');
  const total=cats.length;
  document.getElementById('viewAllBtn').textContent=`↕ View all ${total} categories`;
}

/* ── SHEET ── */
function openSheet(mode, cat){
  sheetMode=mode;
  if(cat) activeCat=cat;
  document.getElementById('sheetOverlay').classList.add('open');
  refreshSheet();
}

function refreshSheet(){
  document.getElementById('sheetMonthLabel').textContent=monthStr();
  const scroll=document.getElementById('sheetScroll');
  const mnav=document.getElementById('sheetMonthNav');
  scroll.scrollTop=0;

  if(sheetMode==='income'){
    document.getElementById('sheetTitle').textContent='💰 Income — '+monthStr();
    mnav.style.display='block';
    buildIncomeSheet(scroll);
  } else if(sheetMode==='all-categories'||sheetMode==='expense-overview'){
    document.getElementById('sheetTitle').textContent='All Categories — '+monthStr();
    mnav.style.display='block';
    buildAllCatsSheet(scroll);
  } else if(sheetMode==='cat-detail'){
    document.getElementById('sheetTitle').textContent=emojiFor(activeCat)+' '+activeCat;
    mnav.style.display='block';
    buildCatDetailSheet(scroll);
  }
}

function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  sheetMode=null;
}
function closeSheetOnBg(e){
  if(e.target===document.getElementById('sheetOverlay')) closeSheet();
}

/* income sheet content */
function buildIncomeSheet(el){
  const rows=currentRows().filter(r=>(r[C.TYPE]||'').toLowerCase()==='income');
  const total=rows.reduce((s,r)=>s+parseAmount(r[C.AMOUNT]),0);
  if(!rows.length){
    el.innerHTML=`<div class="empty-state">No income entries for ${monthStr()}.</div>`;
    return;
  }
  const sorted=[...rows].sort((a,b)=>parseDateStr(b[C.DATE])-parseDateStr(a[C.DATE]));
  el.innerHTML=`
    <div class="sheet-income-summary">
      <div>
        <div class="sit-label">Total this month</div>
        <div class="sit-val">${fmtF(total)}</div>
      </div>
      <div>
        <div class="sit-count-num">${rows.length}</div>
        <div class="sit-count-label">entries</div>
      </div>
    </div>
    <div class="divider"></div>
    ${sorted.map(r=>{
      const amt=parseAmount(r[C.AMOUNT]);
      const cat=(r[C.CAT]||'Income').trim()||'Income';
      const desc=(r[C.DESC]||'').trim()||cat;
      const acct=(r[C.ACCOUNT]||'').trim();
      const meta=[acct,cat].filter(Boolean).join(' · ');
      return `<div class="income-row">
        <div class="income-icon">${emojiFor(cat)}</div>
        <div style="flex:1;overflow:hidden">
          <div class="income-name">${escH(desc)}</div>
          <div class="income-meta">${escH(meta)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="income-amt">${fmtF(amt)}</div>
          <div class="income-date">${formatDate(r[C.DATE])}</div>
        </div>
      </div>`;
    }).join('')}`;
}

/* all categories sheet */
function buildAllCatsSheet(el){
  const rows=currentRows().filter(r=>(r[C.TYPE]||'').toLowerCase()==='expense');
  const catMap={};
  rows.forEach(r=>{ const c=(r[C.CAT]||'Other').trim()||'Other'; catMap[c]=(catMap[c]||0)+parseAmount(r[C.AMOUNT]); });
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const tE=cats.reduce((s,c)=>s+c[1],0);
  if(!cats.length){ el.innerHTML=`<div class="empty-state">No expenses for ${monthStr()}.</div>`; return; }
  el.innerHTML=cats.map((c,i)=>{
    const pct=tE?Math.round(c[1]/tE*100):0;
    const col=PIE_COLORS[i%PIE_COLORS.length];
    return `<div class="cat-row" onclick="openSheet('cat-detail','${esc(c[0])}')">
      <span class="cat-badge" style="background:${col}22;color:${col}">${pct}%</span>
      <span class="cat-emoji">${emojiFor(c[0])}</span>
      <span class="cat-name">${c[0]}</span>
      <span class="cat-amt">${fmtF(c[1])}</span>
    </div>`;
  }).join('');
}

/* category detail sheet */
function buildCatDetailSheet(el){
  // trend chart
  const labels=[],values=[];
  for(let i=6;i>=0;i--){
    let m0=curMonth.month0-i, y=curMonth.year;
    while(m0<0){m0+=12;y--;} while(m0>11){m0-=12;y++;}
    labels.push(MONTHS[m0]);
    const rws=rowsForMonth(y,m0).filter(r=>(r[C.TYPE]||'').toLowerCase()==='expense'&&(r[C.CAT]||'Other').trim()===activeCat);
    values.push(rws.reduce((s,r)=>s+parseAmount(r[C.AMOUNT]),0));
  }

  // transactions
  const rows=currentRows().filter(r=>(r[C.TYPE]||'').toLowerCase()==='expense'&&(r[C.CAT]||'Other').trim()===activeCat);
  const dayMap={};
  rows.forEach(r=>{
    const key=r[C.DATE]||'?';
    if(!dayMap[key]) dayMap[key]={raw:r[C.DATE],ts:parseDateStr(r[C.DATE]),rows:[]};
    dayMap[key].rows.push(r);
  });
  const groups=Object.values(dayMap).sort((a,b)=>b.ts-a.ts);

  const txnHtml=!groups.length
    ? `<div class="empty-state">No "${activeCat}" transactions in ${monthStr()}.</div>`
    : groups.map(g=>{
        const tot=g.rows.reduce((s,r)=>s+parseAmount(r[C.AMOUNT]),0);
        const d=new Date(g.ts);
        const dn=isNaN(d)?'??':String(d.getDate()).padStart(2,'0');
        const dw=isNaN(d)?'':WEEKDAYS[d.getDay()];
        const cls=dw==='Sat'?'sat':dw==='Sun'?'sun':'wd';
        return `<div>
          <div class="txn-date-header">
            <div class="txn-date-left">
              <span class="txn-day-num">${dn}</span>
              <span class="txn-day-name ${cls}">${dw}</span>
            </div>
            <div class="txn-date-right">
              <span class="txn-date-exp">${fmtF(tot)}</span>
            </div>
          </div>
          ${g.rows.map(r=>{
            const amt=parseAmount(r[C.AMOUNT]);
            const desc=(r[C.DESC]||'').trim()||(r[C.CAT]||'—');
            const acct=(r[C.ACCOUNT]||'').trim();
            const sub=(r[C.SUBCAT]||'').trim();
            const meta=[acct,sub].filter(Boolean).join(' · ');
            return `<div class="txn-row">
              <div class="txn-chip">
                <span class="txn-chip-emoji">${emojiFor(activeCat)}</span>
                <span class="txn-chip-label">${activeCat.length>6?activeCat.slice(0,6)+'…':activeCat}</span>
              </div>
              <div class="txn-info">
                <div class="txn-name">${escH(desc)}</div>
                ${meta?`<div class="txn-account">${escH(meta)}</div>`:''}
              </div>
              <span class="txn-amt-e">${fmtF(amt)}</span>
            </div>`;
          }).join('')}
        </div>`;
      }).join('');

  el.innerHTML=`<div class="sheet-trend"><canvas id="trendCanvas" role="img" aria-label="Monthly spend trend">Trend.</canvas></div><div class="divider"></div>${txnHtml}`;

  if(trendChart){trendChart.destroy();trendChart=null;}
  const col=PIE_COLORS[0];
  trendChart=new Chart(document.getElementById('trendCanvas'),{
    type:'line',
    data:{labels,datasets:[{data:values,borderColor:col,borderWidth:2,
      pointBackgroundColor:values.map((_,i)=>i===6?col:'transparent'),
      pointBorderColor:col,pointRadius:values.map((_,i)=>i===6?5:3),
      fill:false,tension:0.35}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtF(ctx.raw)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#6b7280',font:{size:11}}},y:{display:false}},
      layout:{padding:{top:20}}
    }
  });
}

/* ── DATE UTILS ── */
function parseDateStr(s){
  if(!s) return 0;
  const s1=s.trim();
  const m1=s1.match(/^(\d{1,2})[-\/]([A-Za-z]{3})[-\/](\d{4})$/);
  if(m1){ const mo=MONTHS.findIndex(m=>m.toLowerCase()===m1[2].toLowerCase()); return new Date(+m1[3],mo>=0?mo:0,+m1[1]).getTime(); }
  const m2=s1.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(m2) return new Date(+m2[3],+m2[2]-1,+m2[1]).getTime();
  return new Date(s1).getTime()||0;
}
function formatDate(s){
  const ts=parseDateStr(s); if(!ts) return s||'';
  const d=new Date(ts);
  return String(d.getDate()).padStart(2,'0')+' '+MONTHS[d.getMonth()];
}

/* summary tab click aliases */
function openIncomeSheet(){ openSheet('income'); }

/* wire income tab */
document.getElementById('incomeTab').onclick=()=>openSheet('income');
document.getElementById('expenseTab').onclick=()=>openSheet('all-categories');

loadData();
</script>
